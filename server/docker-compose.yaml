services:
  api:
    build: .
    image: project-brev.ly
    ports:
      - '3000:3333'
    env_file:
      - .env
    environment:
      - PORT=3333
      - DATABASE_URL=postgresql://docker:docker@pg:5432/links
    depends_on:
      pg:
        condition: service_healthy
    networks:
      - app-network

  pg:
    image: bitnami/postgresql:latest
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=links
    volumes:
      - './docker:/docker-entrypoint-initdb.d'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docker']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge